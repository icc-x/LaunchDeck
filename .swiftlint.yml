# SwiftLint configuration for LaunchDeck.
#
# The philosophy: keep the default rules, surface common correctness traps, and
# keep code-style opinions targeted at readability rather than dogma. All
# disabled rules below have a rationale inline.

included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - dist
  - Resources

disabled_rules:
  # `Sources/Resources/Localizable.strings` triggers false positives; we keep
  # our own strings helper instead.
  - nslocalizedstring_key
  # We allow `let _ = someValue` sprinkled in SwiftUI bodies to subscribe to
  # state changes. Re-enable once a better pattern emerges.
  - redundant_discardable_let

opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - force_unwrapping
  - last_where
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 80
  error: 160

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 900
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 15
  error: 25

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - to

type_name:
  min_length: 3

reporter: "xcode"
