name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Build
        run: swift build
      - name: Test
        run: swift test
